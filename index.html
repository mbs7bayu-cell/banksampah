<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#4E6E58" id="themeColor">
<title>Login</title>

<style>
body{font-family:sans-serif;background:#f5f5f5;padding:16px}
.card{background:white;padding:16px;border-radius:12px; margin-bottom: 20px;}

input,textarea{
  width:100%;
  padding:10px;
  margin:8px 0;
  border-radius:8px;
  border:1px solid #ccc;
  box-sizing:border-box;
}

.card h2 {
  color: #4E6E58;
}

button{
  width:100%;
  padding:12px;
  background:#4E6E58;
  color:white;
  border:none;
  border-radius:8px;
  cursor:pointer;
  transition:0.2s;
  margin-bottom: 10px;
}

button:hover{
  background:#333333;
  transform:translateY(-2px);
}

button:active{
  transform:translateY(0);
}

button:disabled{
  background:#999;
  cursor:not-allowed;
}

.btnDataNasabah{
  background:#546B41;
}

.btnDataNasabah:hover{
  background:#333333;
}

.list-item {
  padding: 10px;
  border-bottom: 1px solid #eee;
}

.btnHapusNasabah {
  background: #ff4d4d;
  color: white;
  padding: 5px 10px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  transition: 0.2s;
  margin-top: 8px;
  width: auto;
}

img{width:50%;margin-top:10px;border-radius:8px;justify-content:center;display:block;margin-left:auto;margin-right:auto}

.loader {
  border: 3px solid #eee;
  border-top: 3px solid #2d89ef;
  border-radius: 50%;
  width: 20px;
  height: 20px;
  animation: spin 1s linear infinite;
}

@keyframes spin {
  0% { transform: rotate(0deg);}
  100% { transform: rotate(360deg);}
}

@media (min-width: 600px) {
  button {
    width: 100%;
    margin: 10px auto;
    display: block;
  }

  .card {
    max-width: 400px;
    margin: 20px auto;
  }

  .btnCopy {
    width: auto;
    margin: 10px;
  }

  .btnHapusNasabah {
    width: auto;
    margin-top: 10px;
    margin-left: 0px;
  }
  

  h2 {
    margin-left: 20px;
  }


}

.toggle {
  margin-bottom: 5px;
}

.lupaPassword{
  display: inline-block;
  margin-top: 10px;
  text-decoration: none;
}

.btnAdmin {
      position:fixed;
      top:40px;
      right:45px;
      width: 100px;
      background:#04AA6D;
      cursor:pointer;
      box-shadow:0 4px 10px rgba(0,0,0,0.2);
    }

</style>
</head>



<body>

<div class="card">

<h3>Login / Register</h3>

<input id="noHp" placeholder="No HP (62xxx)">
<input id="password" type="password" placeholder="Password">

<div class="toggle" onclick="togglePass()">👁 Lihat Password</div>

<button id="loginBtn" onclick="login()">Login</button>
<button id="registerBtn" onclick="register()" style="display: none;">Register</button>

<a class="lupaPassword" href="https://wa.me/6281214741203?text=Assalamualaikum%2C%20saya%20lupa%20password%20akun%20 saya." target="_blank">Lupa Password?</a>

<p id="status"></p>


</div>

<footer id="footer" style="text-align:center; margin-top:40px; color:#777; font-size:14px;">
  © 2026 Banksampahdigital by mbayusubagja
</footer>

<script src="config.js"></script>

<script>

function togglePass(){
  const p = document.getElementById("password");
  p.type = p.type === "password" ? "text" : "password";
}

// ================= REGISTER =================
async function register(){

  const noHp = document.getElementById("noHp").value;
  const password = document.getElementById("password").value;
  const registerBtn = document.getElementById("registerBtn");
  const loginBtn = document.getElementById("loginBtn");


  const textRegister = registerBtn.innerText;

  const error = validasi();
  if(error){
    showToast(error);
    return;
  }

  registerBtn.innerText = "⏳ Sedang mendaftar...";
  registerBtn.disabled = true;
  loginBtn.disabled = true;

  const res = await fetch(CONFIG.API_URL,{
    method:"POST",
    body:JSON.stringify({
      mode:"register",
      noHp,
      password
    })
  });

  const r = await res.json();

  document.getElementById("status").innerText =
    r.ok ? "✅ Register berhasil" : "❌ " + r.message;

  registerBtn.innerText = textRegister;

  registerBtn.disabled = false;
  loginBtn.disabled = false;
}

// ================= LOGIN =================
async function login(){

  const noHp = document.getElementById("noHp").value;
  const password = document.getElementById("password").value;
  const loginBtn = document.getElementById("loginBtn");
  const registerBtn = document.getElementById("registerBtn");


  const textLogin = loginBtn.innerText;

  const error = validasi();
  if(error){
    showToast(error);
    return;
  }

  loginBtn.innerText = "⏳ Sedang login...";
  loginBtn.disabled = true;
  registerBtn.disabled = true;
  const res = await fetch(CONFIG.API_URL,{
    method:"POST",
    body:JSON.stringify({
      mode:"login",
      noHp,
      password
    })
  });

  const r = await res.json();

  if(r.ok){

  localStorage.setItem("user", r.noHp);
  localStorage.setItem("userId", r.id);
  localStorage.setItem("lastActivity", Date.now());

  window.location.href = "menu.html";

  }else{
    document.getElementById("status").innerText = "❌ " + r.message;
    loginBtn.innerText = textLogin;
    loginBtn.disabled = false;
    registerBtn.disabled = false;
  }
}

function validasi() {
  if (!document.getElementById("password").value) return "Password wajib diisi";
  if (!document.getElementById("noHp").value) return "No HP wajib diisi";
  return null;
}

function showToast(msg) {
  const div = document.createElement("div");
  div.innerText = msg;

  div.style.position = "fixed";
  div.style.bottom = "20px";
  div.style.left = "50%";
  div.style.transform = "translateX(-50%)";
  div.style.background = "#333";
  div.style.color = "#fff";
  div.style.padding = "10px 20px";
  div.style.borderRadius = "8px";
  div.style.zIndex = "9999";

  document.body.appendChild(div);

  setTimeout(() => {
    div.remove();
  }, 2000);
}

</script>

</body>
</html>
