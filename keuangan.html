<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#3B82C4" id="themeColor">
<title>Keuangan</title>
<script src="auth.js"></script>
<style>
body{
    font-family:sans-serif;
    background:#f5f5f5;
    padding:16px
}

.card{
    background:white;
    padding:16px;
    border-radius:12px
}

button{
  width:100%;
  padding:20px;
  background:#4E6E58;
  color:white;
  border:none;
  border-radius:8px;
  cursor:pointer;
  transition:0.2s;
  margin-bottom: 10px;
  font-weight: bold;
}

button:hover{
  background:#333333;
  transform:translateY(-2px);
}

button:active{
  transform:translateY(0);
}

button:disabled{
  background:#999;
  cursor:not-allowed;
}

.card h2 {
  color: #333333;
}

.btnPrint {
  background-color: #666666;
}

.btnPrintKhusus {
  background-color: #666666;
}

@media (min-width: 600px) {
  button {
    width: 100%;
    margin: 10px auto;
    display: block;
  }

  .card {
    max-width: 400px;
    margin: 20px auto;
  }

  .btnCopy {
    width: auto;
    margin: 10px;
  }

  .btnHapusNasabah {
    width: auto;
    margin: 0px;
  }
  

  
}

</style>
</head>

<body>

<div class="card">
<h2>Keuangan</h2>

<button id="btnPemasukan">PEMASUKKAN</button>
<button id="btnPengeluaran">PENGELUARAN</button>
<button id="btnLaporan">LAPORAN</button>
<button id="btnDashboard">📊 MENU</button>

</div>

<footer id="footer" style="text-align:center; margin-top:40px; color:#777; font-size:14px;">
  © 2026 Banksampahdigital by mbayusubagja
</footer>

<script src="config.js"></script>

<script>
const btnPemasukan = document.getElementById('btnPemasukan');
const btnPengeluaran = document.getElementById('btnPengeluaran');
const btnDashboard = document.getElementById('btnDashboard');
const btnLaporan = document.getElementById('btnLaporan');

btnLaporan.addEventListener('click', () =>{
    window.location.href = 'rekapan.html';
});

btnDashboard.addEventListener('click', () => {
    window.location.href = 'menu.html';
});

btnPemasukan.addEventListener('click', () => {
    window.location.href = 'pemasukan.html';
});

btnPengeluaran.addEventListener('click', () => {
    window.location.href = 'pengeluaran.html';
});

</script>
<script src=""></script> 

</body>
</html>
