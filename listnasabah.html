<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#4E6E58" id="themeColor">
<title>Data Nasabah</title>
<script src="auth.js"></script>
<style>
body{font-family:sans-serif;background:#f5f5f5;padding:16px}
.card{background:white;padding:16px;border-radius:12px; margin-bottom: 20px;}

input,textarea{
  width:100%;
  padding:10px;
  margin:8px 0;
  border-radius:8px;
  border:1px solid #ccc;
  box-sizing:border-box;
}

button{
  width:100%;
  padding:12px;
  background:#4E6E58;
  color:white;
  border:none;
  border-radius:8px;
  cursor:pointer;
  transition:0.2s;
  margin-bottom: 10px;
}

.card h2 {
  color: #4E6E58;
}

button:hover{
  background:#333333;
  transform:translateY(-2px);
}

button:active{
  transform:translateY(0);
}

button:disabled{
  background:#999;
  cursor:not-allowed;
}

.btnDataNasabah{
  background:#4E6E58;
}

.btnDataNasabah:hover{
  background:#333333;
}

img{width:50%;margin-top:10px;border-radius:8px;justify-content:center;display:block;margin-left:auto;margin-right:auto}

.loader {
  border: 3px solid #eee;
  border-top: 3px solid #2d89ef;
  border-radius: 50%;
  width: 20px;
  height: 20px;
  animation: spin 1s linear infinite;
}

.list-item {
  cursor: pointer;
  border-radius: 8px;
}

.list-item:hover {
  background-color: #999;
  color: white;
}

.btnHapusNasabah {
  background: #ff4d4d;
  color: white;
  border: none;
  padding: 6px 12px;
  border-radius: 8px;
  cursor: pointer;
  transition: 0.2s;
  width: auto;
  margin-top: 8px;
}

.btnCopy {
  background: #000000;
  color: white;
  border: none;
  padding: 6px 12px;
  border-radius: 8px;
  cursor: pointer;
  transition: 0.2s;
  width: auto;
  margin-top: 8px;
}

.btnPrint {
  background-color: #666666;
}

.btnPrintKhusus {
  background-color: #666666;
}

@keyframes spin {
  0% { transform: rotate(0deg);}
  100% { transform: rotate(360deg);}
}

@media (min-width: 600px) {
  button {
    width: 100%;
    margin: 10px auto;
    display: block;
  }

  .card {
    max-width: 400px;
    margin: 20px auto;
  }

  .btnCopy {
    width: auto;
    margin: 10px;
    display: inline-block;
  }

  .btnHapusNasabah {
    width: auto;
    margin-top: 10px;
    margin-left: 0px;
  }
  

  
}
</style>
</head>

<body>

<div class="card">

<h2>Data Nasabah</h2>

  <div id="listTerakhir">
    <p>Memuat...</p>
  </div>

  <div style="margin-top:16px; display:flex; gap:10px;">

  <button id="btnLoadMore" style="background-color: #666666;">
    Load More
  </button>

  <button id="btnLoadLess" style="display:none; background-color: #666666;">
    Load Less
  </button>

  </div>


</div>

<div class="card">
  <button id="btnPrint" style="background-color: #666666;">🖨️ Print Data Nasabah</button>
  <button id="btnDashboard">Kembali</button>
</div>

<footer id="footer" style="text-align:center; margin-top:40px; color:#777; font-size:14px;">
  © 2026 Banksampahdigital by mbayusubagja
</footer>

<script src="config.js"></script>

<script>
// ================= SIMPAN DATA =================
const btnDashboard = document.getElementById("btnDashboard");
const listTerakhir = document.getElementById("listTerakhir");
const btnPrint = document.getElementById("btnPrint");
const btnHapusNasabah = document.getElementById("btnHapusNasabah");

btnDashboard.addEventListener("click", () => {
  window.location.href = "datanasabah.html";
});

// ================= TOAST =================
function showToast(msg) {
  const div = document.createElement("div");
  div.innerText = msg;

  div.style.position = "fixed";
  div.style.bottom = "20px";
  div.style.left = "50%";
  div.style.transform = "translateX(-50%)";
  div.style.background = "#333";
  div.style.color = "#fff";
  div.style.padding = "10px 20px";
  div.style.borderRadius = "8px";
  div.style.zIndex = "9999";

  document.body.appendChild(div);

  setTimeout(() => {
    div.remove();
  }, 2000);
}

let jumlahTampil = 5;
let dataNasabah = [];

// ================= RENDER LIST =================
function renderNasabah(){

  const dataTampil = dataNasabah.slice(0, jumlahTampil);

  listTerakhir.innerHTML = dataTampil.map(n => `

    <div class="list-item"
      data-id="${n.id}"
      style="padding:10px; border-bottom:1px solid #eee;">

      <b>${n.nama.toUpperCase()}</b><br>

      No HP: ${n.noHp}

      <button
        class="btnCopy"
        onclick="copyText(event, '${n.noHp}')">
        Salin
      </button>

      <br>

      Alamat: ${n.alamat}<br>

      <button
        class="btnHapusNasabah"
        onclick="hapusNasabah(event, '${n.id}')">
        Hapus
      </button>

    </div>

  `).join("");

  // ================= klik nasabah =================
  document.querySelectorAll(".list-item").forEach(item => {

    item.addEventListener("click", function(){

      const idNasabah = this.dataset.id;

      window.location.href =
        "detail-nasabah.html?id=" + idNasabah;

    });

  });

  // ================= tombol =================
  btnLoadMore.style.display =
    jumlahTampil >= dataNasabah.length
    ? "none"
    : "inline-block";

  btnLoadLess.style.display =
    jumlahTampil <= 5
    ? "none"
    : "inline-block";

}

// ================= GET NASABAH =================
async function getNasabah(){

  try {

    const res = await fetch(
      CONFIG.API_URL + "?action=getNasabah"
    );

    const r = await res.json();

    if(!r.ok){
      listTerakhir.innerText = "Gagal memuat";
      return;
    }

    dataNasabah = r.data;

    window.dataNasabah = r.data;

    dataNasabah.sort((a, b) =>
      a.nama.toUpperCase()
       .localeCompare(b.nama.toUpperCase())
    );

    renderNasabah();

  } catch(err){

    console.log(err);

  }

}

// ================= LOAD MORE =================
btnLoadMore.addEventListener("click", function(){

  jumlahTampil += 5;

  renderNasabah();

});

// ================= LOAD LESS =================
btnLoadLess.addEventListener("click", function(){

  jumlahTampil -= 5;

  if(jumlahTampil < 5){
    jumlahTampil = 5;
  }

  renderNasabah();

});

// ================= SALIN TEKS =================
function copyText(e, text){
  e.stopPropagation();
  navigator.clipboard.writeText(text)
    .then(() => {
      showToast("Berhasil disalin");
    })
    .catch(err => {
      console.error("Gagal copy:", err);
    });
}

// ================= HAPUS NASABAH =================
async function hapusNasabah(e, id){

  e.stopPropagation();
  
  if(!confirm("Hapus nasabah ini?")) return;

  console.log("Hapus nasabah dengan id:", id);

  try{

    const body = new URLSearchParams({
      mode: "hapusNasabah",
      id: id
    });

    const res = await fetch(CONFIG.API_URL,{
      method:"POST",
      body: body
    });

    const r = await res.json();

    if(!r.ok){
      alert(r.message);
      return;
    }

    alert("Nasabah berhasil dihapus");

    getNasabah();

  }catch(err){

    console.log(err);
    alert("Gagal menghapus nasabah");

  }

}

window.addEventListener("DOMContentLoaded", () => {
  getNasabah();

  setInterval(getNasabah, 20000);
});



</script>
<script src="printnasabah.js"></script>
</body>
</html>
