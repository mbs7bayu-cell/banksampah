<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#3B82C4" id="themeColor">
<title>Data Penimbangan</title>
<script src="auth.js"></script>
<style>
body{font-family:sans-serif;background:#f5f5f5;padding:16px}
.card{background:white;padding:16px;border-radius:12px; margin-bottom: 20px;}

input,textarea{
  width:100%;
  padding:10px;
  margin:8px 0;
  border-radius:8px;
  border:1px solid #ccc;
  box-sizing:border-box;
}

button{
  width:100%;
  padding:12px;
  background:#4E6E58;
  color:white;
  border:none;
  border-radius:8px;
  cursor:pointer;
  transition:0.2s;
  margin-bottom: 10px;
}

button:hover{
  background:#333333;
  transform:translateY(-2px);
}

button:active{
  transform:translateY(0);
}

button:disabled{
  background:#999;
  cursor:not-allowed;
}

.btnDataNasabah{
  background:#4E6E58;
}

.btnDataNasabah:hover{
  background:#555555;
}

.card h2 {
  color: #4E6E58;
}

.list-item {
  cursor: pointer;
  border-radius: 8px;
}

.list-item:hover {
  background-color: #999;
  color: white;
}

.btnHapusPenimbangan {
  background: #ff4d4d;
  color: white;
  border: none;
  padding: 6px 12px;
  border-radius: 8px;
  cursor: pointer;
  transition: 0.2s;
  width: auto;
  margin-top: 8px;
}

img{width:50%;margin-top:10px;border-radius:8px;justify-content:center;display:block;margin-left:auto;margin-right:auto}

.loader {
  border: 3px solid #eee;
  border-top: 3px solid #2d89ef;
  border-radius: 50%;
  width: 20px;
  height: 20px;
  animation: spin 1s linear infinite;
}

.btnPrint {
  background-color: #666666;
}

.btnPrintKhusus {
  background-color: #666666;
}



@keyframes spin {
  0% { transform: rotate(0deg);}
  100% { transform: rotate(360deg);}
}

@media (min-width: 600px) {
  button {
    width: 100%;
    margin: 10px auto;
    display: block;
  }

  .card {
    max-width: 400px;
    margin: 20px auto;
  }

  .btnCopy {
    width: auto;
    margin: 10px;
  }

  .btnHapusPenimbangan {
    width: auto;
    margin-top: 10px;
    margin-left: 0px;
  }
  

  
}
</style>
</head>

<body>

<div class="card">

<h2>Penimbangan Nasabah</h2>

  <div id="listTerakhir">
    <p>Memuat...</p>
  </div>


</div>

<div class="card">
  <button id="btnDashboard">Kembali</button>
</div>

<footer id="footer" style="text-align:center; margin-top:40px; color:#777; font-size:14px;">
  © 2026 Banksampahdigital by mbayusubagja
</footer>

<script src="config.js"></script>

<script>
// ================= SIMPAN DATA =================
const btnDashboard = document.getElementById("btnDashboard");
const listTerakhir = document.getElementById("listTerakhir");


btnDashboard.addEventListener("click", () => {
  window.location.href = "datapenimbangan.html";
});

// ================= TOAST =================
function showToast(msg) {
  const div = document.createElement("div");
  div.innerText = msg;

  div.style.position = "fixed";
  div.style.bottom = "20px";
  div.style.left = "50%";
  div.style.transform = "translateX(-50%)";
  div.style.background = "#333";
  div.style.color = "#fff";
  div.style.padding = "10px 20px";
  div.style.borderRadius = "8px";
  div.style.zIndex = "9999";

  document.body.appendChild(div);

  setTimeout(() => {
    div.remove();
  }, 2000);
}

let jumlahTanggalTampil = 3;
let dataPenimbangan = [];

function renderPenimbangan(){

  const data = dataPenimbangan;

  // ================= TANGGAL UNIK =================
  const tanggalUnik = [
    ...new Set(data.map(n => n.tgl))
  ]

  .sort((a, b) => new Date(b) - new Date(a));



  // ================= TAMPILKAN =================
  listTerakhir.innerHTML = tanggalUnik

    .slice(0, jumlahTanggalTampil)

    .map(tgl => {

      // ================= FILTER =================
      const detailTanggal =

        data

          .filter(n => n.tgl === tgl)

          .sort((a, b) =>

            (a.nama || "")
              .toUpperCase()

              .localeCompare(

                (b.nama || "")
                  .toUpperCase()

              )

          );



      // ================= TOTAL =================
      const totalBerat =

        detailTanggal.reduce((sum, item) => {

          return sum +
            Number(item.beratSampah || 0);

        }, 0);



      // ================= SATUAN =================
      const satuan =
        detailTanggal[0]?.satuan || "";


      // ================= GRAND TOTAL =================
      const totalKeseluruhan =

        detailTanggal.reduce((sum, item) => {

          return sum +
            Number(item.totalNasabah || 0);

        }, 0);



      // ================= GROUPING =================
      const grupNama = {};

      detailTanggal.forEach(item => {

        const nama =
          item.nama || "Tanpa Nama";

        if (!grupNama[nama]) {

          grupNama[nama] = [];

        }

        grupNama[nama].push(item);

      });



      // ================= HTML NAMA =================
      const htmlNama =

        Object.keys(grupNama)

          .sort((a, b) =>
            a.localeCompare(b)
          )

          .map(nama => {

            const items = grupNama[nama];



            const totalOrang =

              items.reduce((sum, item) => {

                return sum +
                  Number(item.beratSampah || 0);

              }, 0);



            return `

              <div style="
                padding:10px;
                margin-bottom:12px;
                border:1px solid #ddd;
                border-radius:10px;
              ">

                <div style="
                  background:#000;
                  color:white;
                  padding:8px;
                  margin-bottom:8px;
                ">

                  <b>${nama}</b><br>

                  <small>
                    Total:
                    ${totalOrang}
                    ${items[0]?.satuan || ""}
                  </small>

                </div>



                ${items.map(item => `

                  <div style="
                    padding:8px 0;
                    border-bottom:1px solid #eee;
                  ">

                    Jenis Sampah:
                    <b>${item.jenisSampah}</b><br>

                    Berat:
                    <b>
                      ${item.beratSampah}
                      ${item.satuan}
                    </b><br>

                    Harga satuan:
                    <b>
                      Rp ${new Intl.NumberFormat("id-ID")
                    .format(item.hargaNasabah)}
                    </b><br>

                    Total:
                    <b>
                      Rp ${new Intl.NumberFormat("id-ID")
                    .format(item.totalNasabah)}
                    </b><br>

                    <button
                      class="btnHapusPenimbangan"
                      onclick="
                        hapusPenimbangan(
                          event,
                          '${item.id}'
                        )
                      "
                    >
                      Hapus
                    </button>

                  </div>

                `).join("")}

              </div>

            `;

          }).join("");



      // ================= RETURN =================
      return `

        <div style="
          border:1px solid #ddd;
          border-radius:10px;
          margin-bottom:10px;
          overflow:hidden;
          background:#fff;
        ">

          <div
            class="tanggal-header"
            data-tgl="${tgl}"

            style="
              padding:12px;
              background:#f5f5f5;
              cursor:pointer;
            "
          >

            <b>${tgl}</b><br>

            <small>
              Total Berat:
              ${totalBerat}
              ${satuan}
            </small>

          </div>



          <div
            class="detail-box"
            id="detail-${tgl}"

            style="
              display:none;
              padding:10px;
            "
          >

            ${htmlNama}

            <p>
              <b>
                Total Keseluruhan:
                Rp ${new Intl.NumberFormat("id-ID")
                  .format(totalKeseluruhan)}
              </b>
            </p>

            <button
              class="btnPrint"
              data-tgl="${tgl}"
            >
              🖨️ Print Data Penimbangan
            </button>

            <button
              class="btnPrintKhusus"
              data-tgl="${tgl}"
            >
              🖨️ Print Data Penimbangan Khusus
            </button>

          </div>

        </div>

      `;

    }).join("");



  // ================= BUTTON =================
  listTerakhir.innerHTML += `

    <div style="
      display:flex;
      gap:10px;
      margin-top:16px;
    ">

      ${
        jumlahTanggalTampil < tanggalUnik.length
        ? `
          <button id="btnLoadMore" style="background-color: #666666;">
            Load More
          </button>
        `
        : ""
      }

      ${
        jumlahTanggalTampil > 3
        ? `
          <button id="btnLoadLess" style="background-color: #666666;">
            Load Less
          </button>
        `
        : ""
      }

    </div>

  `;



  // ================= EVENT DROPDOWN =================
  document.querySelectorAll(".tanggal-header")
    .forEach(header => {

      header.addEventListener("click", () => {

        const tgl = header.dataset.tgl;

        const detail =
          document.getElementById(`detail-${tgl}`);

        if(detail.style.display === "none"){

          detail.style.display = "block";

        } else {

          detail.style.display = "none";

        }

      });

    });



  // ================= LOAD MORE =================
  const btnLoadMore =
    document.getElementById("btnLoadMore");

  if(btnLoadMore){

    btnLoadMore.addEventListener("click", () => {

      jumlahTanggalTampil += 3;

      renderPenimbangan();

    });

  }



  // ================= LOAD LESS =================
  const btnLoadLess =
    document.getElementById("btnLoadLess");

  if(btnLoadLess){

    btnLoadLess.addEventListener("click", () => {

      jumlahTanggalTampil -= 3;

      if(jumlahTanggalTampil < 3){
        jumlahTanggalTampil = 3;
      }

      renderPenimbangan();

    });

  }

}

// ================= HAPUS PENIMBANGAN =================
async function hapusPenimbangan(e, id){

  e.stopPropagation();
  
  if(!confirm("Hapus penimbangan ini?")) return;

  console.log("Hapus penimbangan dengan id:", id);

  try{

    const body = new URLSearchParams({
      mode: "hapusPenimbangan",
      id: id
    });

    const res = await fetch(CONFIG.API_URL,{
      method:"POST",
      body: body
    });

    const r = await res.json();

    if(!r.ok){
      alert(r.message);
      return;
    }

    alert("Penimbangan berhasil dihapus");

    getPenimbangan();

  }catch(err){

    console.log(err);
    alert("Gagal menghapus penimbangan");

  }

}

// ================= LIST Penimbangan =================
// ================= LIST Penimbangan =================
async function getPenimbangan(){

  try {

    const res = await fetch(
      CONFIG.API_URL + "?action=getPenimbangan"
    );

    const r = await res.json();

    if(!r.ok){
      listTerakhir.innerText = "Gagal memuat";
      return;
    }

    // simpan global
    dataPenimbangan = r.data || [];

    // simpan untuk print
    window.dataPenimbangan = r.data || [];

    // render
    renderPenimbangan();

  } catch(err){

    console.log(err);

  }

}

window.addEventListener("DOMContentLoaded", () => {
  getPenimbangan();

  //setInterval(getPenimbangan, 20000);
});



</script>
<script src="printpenimbangan.js"></script> 

</body>
</html>
