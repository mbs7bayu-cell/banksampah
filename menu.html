<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#3B82C4" id="themeColor">
<title>Menu</title>
<script src="auth.js"></script>
<style>
body{
    font-family:sans-serif;
    background:#f5f5f5;
    padding:16px
}

.card{
    background:white;
    padding:30px;
    border-radius:12px
}

button{
  width:100%;
  padding:20px;
  background:#4E6E58;
  color:white;
  border:none;
  border-radius:8px;
  cursor:pointer;
  transition:0.2s;
  margin-bottom: 10px;
  font-weight: bold;
}

button:hover{
  background:#333333;
  transform:translateY(-2px);
}

button:active{
  transform:translateY(0);
}

button:disabled{
  background:#999;
  cursor:not-allowed;
}

#card-top {
  background: #4E6E58;
  color: white;
  border-bottom-left-radius: 0px;
  border-bottom-right-radius: 0px;
  line-height: 1.3;
}

#card-bottom {
  border-top-left-radius: 0px;
  border-top-right-radius: 0px;
}

#btnLogout {
  
      position:block;
      color: white;
      width: 70px;
      background:#333333;
      cursor:pointer;
      box-shadow:0 4px 6px rgba(0,0,0,0.2);
      padding: 8px;
    
}

#btnProfil {
  
      position:block;
      color: white;
      width: 70px;
      background:#333333;
      cursor:pointer;
      box-shadow:0 4px 6px rgba(0,0,0,0.2);
      padding: 8px;
    
}

#btnLogout:hover {
      background:#666666;
      transform:translateY(-2px);
    }

#card-bottom h2 {
    color: #4E6E58;
  }



@media (min-width: 600px) {
  button {
    width: 90%;
    margin: 10px auto;
    display: block;
  }

  .card {
    max-width: 400px;
    margin: auto;
  }


  h2 {
    margin-left: 20px;
  }

  #btnLogout {
    display: inline-block;
  }

  #btnProfil {
      display: inline-block;
      margin-left: 20px;
    
  }

  

}


</style>
</head>

<body>

<div class="card" id="card-top">
  <h2>Website<br>
    Bank Sampah<br>
    Digital<br></h2>

    <button id="btnProfil" onclick="profil()">Profil</button>
    <button id="btnLogout" onclick="logout()">Logout</button>
    
</div>

<div class="card" id="card-bottom">

<h2 id="judul">Menu</h2>

<button id="btnTambahNasabah">TAMBAH NASABAH</button>
<button id="btnTambahDataSampah">TAMBAH DATA SAMPAH</button>
<button id="btnTambahPenimbangan">PENIMBANGAN</button>
<button id="btnKeuangan">KEUANGAN</button>

</div>

<footer id="footer" style="text-align:center; margin-top:40px; color:#777; font-size:14px;">
  © 2026 Banksampahdigital by mbayusubagja
</footer>

<script src="config.js"></script>

<script>
const btnTambahNasabah = document.getElementById('btnTambahNasabah');
const btnTambahDataSampah = document.getElementById('btnTambahDataSampah');
const btnTambahPenimbangan = document.getElementById('btnTambahPenimbangan');
const btnKeuangan = document.getElementById('btnKeuangan');


btnTambahNasabah.addEventListener('click', () => {
    window.location.href = 'datanasabah.html';
});

btnTambahDataSampah.addEventListener('click', () => {
    window.location.href = 'datasampah.html';
});

btnTambahPenimbangan.addEventListener('click', () => {
    window.location.href = 'datapenimbangan.html';
});

btnKeuangan.addEventListener('click', () => {
    window.location.href = 'keuangan.html';
});

function profil () {
  window.location.href = 'profil.html';
}
</script>
<script src=""></script> 

</body>
</html>
