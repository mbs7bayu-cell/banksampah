<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#3B82C4" id="themeColor">
<title>Data Pemasukan</title>
<script src="auth.js"></script>
<style>
body{font-family:sans-serif;background:#f5f5f5;padding:16px}
.card{background:white;padding:16px;border-radius:12px; margin-bottom: 20px;}

input,textarea{
  width:100%;
  padding:10px;
  margin:8px 0;
  border-radius:8px;
  border:1px solid #ccc;
  box-sizing:border-box;
}

button{
  width:100%;
  padding:12px;
  background:#4E6E58;
  color:white;
  border:none;
  border-radius:8px;
  cursor:pointer;
  transition:0.2s;
  margin-bottom: 10px;
}

button:hover{
  background:#333333;
  transform:translateY(-2px);
}

button:active{
  transform:translateY(0);
}

button:disabled{
  background:#999;
  cursor:not-allowed;
}

.btnDataNasabah{
  background:#4E6E58;
}

.btnDataNasabah:hover{
  background:#555555;
}

.card h2 {
  color: #4E6E58;
}

.list-item {
  cursor: pointer;
  border-radius: 8px;
}

.list-item:hover {
  background-color: #999;
  color: white;
}

.btnHapusPenimbangan {
  background: #ff4d4d;
  color: white;
  border: none;
  padding: 6px 12px;
  border-radius: 8px;
  cursor: pointer;
  transition: 0.2s;
  width: auto;
  margin-top: 8px;
}

img{width:50%;margin-top:10px;border-radius:8px;justify-content:center;display:block;margin-left:auto;margin-right:auto}

.loader {
  border: 3px solid #eee;
  border-top: 3px solid #2d89ef;
  border-radius: 50%;
  width: 20px;
  height: 20px;
  animation: spin 1s linear infinite;
}

.btnPrint {
  background-color: #666666;
}

.btnPrintKhusus {
  background-color: #666666;
}

@keyframes spin {
  0% { transform: rotate(0deg);}
  100% { transform: rotate(360deg);}
}

@media (min-width: 600px) {
  button {
    width: 100%;
    margin: 10px auto;
    display: block;
  }

  .card {
    max-width: 400px;
    margin: 20px auto;
  }

  .btnCopy {
    width: auto;
    margin: 10px;
  }

  .btnHapusNasabah {
    width: auto;
    margin: 0px;
  }
  

}
</style>
</head>

<body>

<div class="card">

<h2>Data Pemasukan</h2>

  <div id="listTerakhir">
    <p>Memuat...</p>
  </div>


</div>

<div class="card">
  <button id="btnDashboard">Kembali</button>
</div>

<footer id="footer" style="text-align:center; margin-top:40px; color:#777; font-size:14px;">
  © 2026 Banksampahdigital by mbayusubagja
</footer>

<script src="config.js"></script>

<script>
// ================= SIMPAN DATA =================
const btnDashboard = document.getElementById("btnDashboard");
const listTerakhir = document.getElementById("listTerakhir");

btnDashboard.addEventListener("click", () => {
  window.location.href = "keuangan.html";
});

// ================= TOAST =================
function showToast(msg) {
  const div = document.createElement("div");
  div.innerText = msg;

  div.style.position = "fixed";
  div.style.bottom = "20px";
  div.style.left = "50%";
  div.style.transform = "translateX(-50%)";
  div.style.background = "#333";
  div.style.color = "#fff";
  div.style.padding = "10px 20px";
  div.style.borderRadius = "8px";
  div.style.zIndex = "9999";

  document.body.appendChild(div);

  setTimeout(() => {
    div.remove();
  }, 2000);
}


let jumlahTanggalTampil = 3;


function renderPemasukan(){

  listTerakhir.innerHTML = "";



  // ================= TANGGAL =================

  const semuaTanggal = [

    ...new Set([

      ...dataPenimbangan.map(i => i.tgl),

      ...dataSortir.map(i => i.tgl)

    ])

  ].sort((a,b)=>

    new Date(b) - new Date(a)

  );



  semuaTanggal

    .slice(0, jumlahTanggalTampil)

    .forEach(tgl => {

      // ================= PENIMBANGAN =================

      const penimbanganTanggal =
        dataPenimbangan.filter(

          i => i.tgl === tgl

        );



      const totalNasabah =
        penimbanganTanggal.reduce(

          (sum, item) =>

            sum + Number(item.totalNasabah || 0),

          0

        );



      // ================= SORTIR =================

      const sortirTanggal =
        dataSortir.filter(

          i => i.tgl === tgl

        );



      const totalJual =
        sortirTanggal.reduce(

          (sum, item) =>

            sum + Number(item.totalJual || 0),

          0

        );



      // ================= PEMASUKAN =================

      const pemasukan =
        totalJual - totalNasabah;



      // ================= DETAIL PENIMBANGAN =================

      const htmlPenimbangan =

        penimbanganTanggal.map(item => `

          <div style="
            padding:8px;
            border-bottom:1px solid #eee;
          ">

            <b>${item.jenisSampah}</b><br>

            Berat:
            ${item.beratSampah}
            ${item.satuan}<br>

            Total Nasabah:
            Rp ${new Intl.NumberFormat("id-ID")
              .format(item.totalNasabah || 0)}

          </div>

        `).join("");



      // ================= DETAIL SORTIR =================

      const htmlSortir =

        sortirTanggal.map(item => `

          <div style="
            padding:8px;
            border-bottom:1px solid #eee;
          ">

            <b>${item.jenisSampah}</b><br>

            Berat:
            ${item.beratSampah}
            ${item.satuan}<br>

            Total Jual:
            Rp ${new Intl.NumberFormat("id-ID")
              .format(item.totalJual || 0)}

          </div>

        `).join("");



      listTerakhir.innerHTML += `

        <div style="
          border:1px solid #ddd;
          border-radius:10px;
          margin-bottom:12px;
          overflow:hidden;
          background:white;
        ">

          <div
            class="tanggal-header"
            data-tgl="${tgl}"

            style="
              padding:12px;
              background:#f5f5f5;
              cursor:pointer;
            "
          >

            <b>${tgl}</b><br>

            <small>
              Pemasukan:
              Rp ${new Intl.NumberFormat("id-ID")
                .format(pemasukan)}
            </small>

          </div>



          <div
            id="detail-${tgl}"
            style="
              display:none;
              padding:12px;
            "
          >

            <h4>Penimbangan Nasabah</h4>

            ${htmlPenimbangan || "<p>Tidak ada data</p>"}



            <p>
              <b>
                Total Nasabah:
                Rp ${new Intl.NumberFormat("id-ID")
                  .format(totalNasabah)}
              </b>
            </p>



            <hr>



            <h4>Data Sortir</h4>

            ${htmlSortir || "<p>Tidak ada data</p>"}



            <p>
              <b>
                Total Jual:
                Rp ${new Intl.NumberFormat("id-ID")
                  .format(totalJual)}
              </b>
            </p>



            <hr>



            <div style="
              background:#2d89ef;
              color:white;
              padding:12px;
              border-radius:8px;
              margin-bottom:10px;
            ">

              <b>
                Total Pemasukan:
                Rp ${new Intl.NumberFormat("id-ID")
                  .format(pemasukan)}
              </b>

            </div>



            <button
              class="btnPrint"
              data-tgl="${tgl}"
            >
              🖨️ Print Pemasukan
            </button>

          </div>

        </div>

      `;

    });




  // ================= LOAD MORE / LESS =================

  listTerakhir.innerHTML += `

    <div style="
      display:flex;
      gap:10px;
      margin-top:16px;
    ">

      ${
        jumlahTanggalTampil < semuaTanggal.length
        ? `
          <button
            id="btnLoadMore"
            style="background:#666666;"
          >
            Load More
          </button>
        `
        : ""
      }

      ${
        jumlahTanggalTampil > 3
        ? `
          <button
            id="btnLoadLess"
            style="background:#666666;"
          >
            Load Less
          </button>
        `
        : ""
      }

    </div>

  `;




  // ================= DROPDOWN =================

  document.querySelectorAll(".tanggal-header")

    .forEach(header => {

      header.addEventListener("click", () => {

        const tgl =
          header.dataset.tgl;

        const detail =
          document.getElementById(`detail-${tgl}`);

        if(detail.style.display === "none"){

          detail.style.display = "block";

        } else {

          detail.style.display = "none";

        }

      });

    });




  // ================= LOAD MORE =================

  const btnLoadMore =
    document.getElementById("btnLoadMore");

  if(btnLoadMore){

    btnLoadMore.addEventListener("click", () => {

      jumlahTanggalTampil += 3;

      renderPemasukan();

    });

  }




  // ================= LOAD LESS =================

  const btnLoadLess =
    document.getElementById("btnLoadLess");

  if(btnLoadLess){

    btnLoadLess.addEventListener("click", () => {

      jumlahTanggalTampil -= 3;

      if(jumlahTanggalTampil < 3){

        jumlahTanggalTampil = 3;

      }

      renderPemasukan();

    });

  }

}

async function getData(){

  try {

    const [resPenimbangan, resSortir] =
      await Promise.all([

        fetch(
          CONFIG.API_URL + "?action=getPenimbangan"
        ),

        fetch(
          CONFIG.API_URL + "?action=getSortir"
        )

      ]);



    const penimbangan =
      await resPenimbangan.json();

    const sortir =
      await resSortir.json();



    dataPenimbangan =
      penimbangan.data || [];

    dataSortir =
      sortir.data || [];



    renderPemasukan();

  } catch(err){

    console.log(err);

  }

}


window.addEventListener("DOMContentLoaded", () => {
  getData();

  //setInterval(getPenimbangan, 20000);
});



</script>
<script src="printpemasukan.js"></script> 

</body>
</html>
