<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#4E6E58" id="themeColor">
<title>Data Penarikan</title>
<script src="auth.js"></script>
<style>
body{font-family:sans-serif;background:#f5f5f5;padding:16px}
.card{background:white;padding:16px;border-radius:12px; margin-bottom: 20px;}

input,textarea{
  width:100%;
  padding:10px;
  margin:8px 0;
  border-radius:8px;
  border:1px solid #ccc;
  box-sizing:border-box;
}

button{
  width:100%;
  padding:12px;
  background:#4E6E58;
  color:white;
  border:none;
  border-radius:8px;
  cursor:pointer;
  transition:0.2s;
  margin-bottom: 10px;
}

button:hover{
  background:#333333;
  transform:translateY(-2px);
}

button:active{
  transform:translateY(0);
}

button:disabled{
  background:#999;
  cursor:not-allowed;
}

.btnDataNasabah{
  background:#4E6E58;
}

.btnDataNasabah:hover{
  background:#555555;
}

.card h2 {
  color: #4E6E58;
}

.list-item {
  cursor: pointer;
  border-radius: 8px;
}

.list-item:hover {
  background-color: #999;
  color: white;
}

.btnHapusPenimbangan {
  background: #ff4d4d;
  color: white;
  border: none;
  padding: 6px 12px;
  border-radius: 8px;
  cursor: pointer;
  transition: 0.2s;
  width: auto;
  margin-top: 8px;
}

img{width:50%;margin-top:10px;border-radius:8px;justify-content:center;display:block;margin-left:auto;margin-right:auto}

.loader {
  border: 3px solid #eee;
  border-top: 3px solid #2d89ef;
  border-radius: 50%;
  width: 20px;
  height: 20px;
  animation: spin 1s linear infinite;
}

.btnPrint {
  background-color: #666666;
}

.btnPrintKhusus {
  background-color: #666666;
}



@keyframes spin {
  0% { transform: rotate(0deg);}
  100% { transform: rotate(360deg);}
}

@media (min-width: 600px) {
  button {
    width: 100%;
    margin: 10px auto;
    display: block;
  }

  .card {
    max-width: 400px;
    margin: 20px auto;
  }

  .btnCopy {
    width: auto;
    margin: 10px;
  }

  .btnHapusNasabah {
    width: auto;
    margin: 0px;
  }
  

  
}
</style>
</head>

<body>

<div class="card">

<h2>Data Penarikan</h2>

  <div id="listTerakhir">
    <p>Memuat...</p>
  </div>


</div>

<div class="card">
  <button id="btnDashboard">Kembali</button>
</div>

<footer id="footer" style="text-align:center; margin-top:40px; color:#777; font-size:14px;">
  © 2026 Banksampahdigital by mbayusubagja
</footer>

<script src="config.js"></script>

<script>
// ================= SIMPAN DATA =================
const btnDashboard = document.getElementById("btnDashboard");
const listTerakhir = document.getElementById("listTerakhir");

btnDashboard.addEventListener("click", () => {
  window.location.href = "penarikan-nasabah.html";
});

// ================= TOAST =================
function showToast(msg) {
  const div = document.createElement("div");
  div.innerText = msg;

  div.style.position = "fixed";
  div.style.bottom = "20px";
  div.style.left = "50%";
  div.style.transform = "translateX(-50%)";
  div.style.background = "#333";
  div.style.color = "#fff";
  div.style.padding = "10px 20px";
  div.style.borderRadius = "8px";
  div.style.zIndex = "9999";

  document.body.appendChild(div);

  setTimeout(() => {
    div.remove();
  }, 2000);
}

let jumlahTanggalTampil = 3;
let dataPenarikan = [];

//render penarikan
function renderPenarikan() {

  // ================= DATA =================
  const data = dataPenarikan;

  // kosongkan tulisan memuat
  listTerakhir.innerHTML = "";



  // ================= TANGGAL UNIK =================
  const tanggalUnik = [

    ...new Set(data.map(n => n.tgl))

  ]

  .sort((a, b) => new Date(b) - new Date(a));



  // ================= GRAND TOTAL =================
  const grandTotalPenarikan = data.reduce((sum, item) => {

    return sum +
      Number(item.nominalPenarikan || 0);

  }, 0);



  // =========================================================
  // TAMPILKAN DATA PER TANGGAL
  // =========================================================

  listTerakhir.innerHTML += tanggalUnik
    .slice(0, jumlahTanggalTampil)
    .map(tgl => {

      // =====================================================
      // FILTER DATA SESUAI TANGGAL
      // =====================================================

      const detailTanggal =

        data

          .filter(n => n.tgl === tgl)

          .sort((a, b) =>

            (a.nama || "")
              .toUpperCase()

              .localeCompare(

                (b.nama || "")
                  .toUpperCase()

              )

          );



      // =====================================================
      // TOTAL PENARIKAN
      // =====================================================

      const totalPenarikan =

        detailTanggal.reduce((sum, item) => {

          return sum +
            Number(item.nominalPenarikan || 0);

        }, 0);



      // =====================================================
      // GROUPING NAMA
      // =====================================================

      const grupNama = {};

      detailTanggal.forEach(item => {

        const nama =
          item.nama || "Tanpa Nama";

        if (!grupNama[nama]) {

          grupNama[nama] = [];

        }

        grupNama[nama].push(item);

      });



      // =====================================================
      // HTML PER NAMA
      // =====================================================

      const htmlNama =

        Object.keys(grupNama)

          .sort((a, b) =>
            a.localeCompare(b)
          )

          .map(nama => {

            const items = grupNama[nama];



            const totalPenarikanOrang =

              items.reduce((sum, item) => {

                return sum +
                  Number(item.nominalPenarikan || 0);

              }, 0);



            return `

              <div style="
                padding:10px;
                margin-bottom:12px;
              ">

                <div style="
                  background:#000;
                  color:white;
                  padding:8px;
                  margin-bottom:8px;
                ">

                  <b>${nama}</b><br>

                  <small>
                    Total Penarikan:
                    Rp ${new Intl.NumberFormat("id-ID")
                      .format(totalPenarikanOrang)}
                  </small>

                </div>

                ${items.map(item => `

                  <div style="
                    padding:8px 0;
                    border-bottom:1px solid #eee;
                  ">

                    Pengeluaran:
                    <b>
                      Rp ${new Intl.NumberFormat("id-ID")
                        .format(item.nominalPenarikan)}
                    </b><br>

                  </div>

                `).join("")}

              </div>

            `;

          }).join("");



      // =====================================================
      // RETURN HTML TANGGAL
      // =====================================================

      return `

        <div style="
          border:1px solid #ddd;
          border-radius:10px;
          margin-bottom:10px;
          overflow:hidden;
          background:#fff;
        ">

          <div
            class="tanggal-header"
            data-tgl="${tgl}"

            style="
              padding:12px;
              background:#f5f5f5;
              cursor:pointer;
            "
          >

            <b>${tgl}</b><br>

            <small>
              Total Penarikan:
              Rp ${new Intl.NumberFormat("id-ID")
                .format(totalPenarikan)}
            </small>

          </div>



          <div
            class="detail-box"
            id="detail-${tgl}"

            style="
              display:none;
              padding:10px;
            "
          >

            ${htmlNama}

            <p>
              <b>
                Total Pengeluaran:
                Rp ${new Intl.NumberFormat("id-ID")
                  .format(totalPenarikan)}
              </b>
            </p>

            <button
              class="btnPrint"
              data-tgl="${tgl}"
            >
              🖨️ Print Penarikan Detail Nasabah
            </button>

          </div>

        </div>

      `;

    }).join("");



  // ================= BUTTON =================
  listTerakhir.innerHTML += `

    <div style="
      display:flex;
      gap:10px;
      margin-top:16px;
    ">

      ${
        jumlahTanggalTampil < tanggalUnik.length
        ? `
          <button id="btnLoadMore" style="background-color: #666666;">
            Load More
          </button>
        `
        : ""
      }

      ${
        jumlahTanggalTampil > 3
        ? `
          <button id="btnLoadLess" style="background-color: #666666;">
            Load Less
          </button>
        `
        : ""
      }

    </div>

  `;



  // ================= GRAND TOTAL =================
  listTerakhir.innerHTML += `

    <div style="
      padding:12px;
      background:#2d89ef;
      color:white;
      border-radius:8px;
    ">

      <b>
        Grand Total Penarikan:
        Rp ${new Intl.NumberFormat("id-ID")
          .format(grandTotalPenarikan)}
      </b>

    </div>

  `;



  // ================= EVENT DROPDOWN =================
  document.querySelectorAll(".tanggal-header")
    .forEach(header => {

      header.addEventListener("click", () => {

        const tgl = header.dataset.tgl;

        const detail =
          document.getElementById(`detail-${tgl}`);

        if(detail.style.display === "none"){

          detail.style.display = "block";

        } else {

          detail.style.display = "none";

        }

      });

    });



  // ================= LOAD MORE =================
  const btnLoadMore =
    document.getElementById("btnLoadMore");

  if(btnLoadMore){

    btnLoadMore.addEventListener("click", () => {

      jumlahTanggalTampil += 3;

      renderPenarikan();

    });

  }



  // ================= LOAD LESS =================
  const btnLoadLess =
    document.getElementById("btnLoadLess");

  if(btnLoadLess){

    btnLoadLess.addEventListener("click", () => {

      jumlahTanggalTampil -= 3;

      if(jumlahTanggalTampil < 3){
        jumlahTanggalTampil = 3;
      }

      renderPenarikan();

    });

  }

}



// ================= get penarikan =================
async function getPenarikan(){

  try {

    const res = await fetch(
      CONFIG.API_URL + "?action=getPenarikan"
    );

    const r = await res.json();

    if(!r.ok){
      listTerakhir.innerText = "Gagal memuat";
      return;
    }

    // simpan global
    dataPenarikan = r.data || [];

    //simpan data untuk print
    window.dataPenarikan = r.data || [];

    // render
    renderPenarikan();

  } catch(err){

    console.log(err);

  }

}


window.addEventListener("DOMContentLoaded", () => {
  getPenarikan();

  //setInterval(getPenimbangan, 20000);
});



</script>
<script src="printpenarikan.js"></script> 

</body>
</html>
