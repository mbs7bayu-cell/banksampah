<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#4E6E58" id="themeColor">
<title>Data Pengeluaran</title>
<script src="auth.js"></script>
<style>
body{font-family:sans-serif;background:#f5f5f5;padding:16px}
.card{background:white;padding:16px;border-radius:12px; margin-bottom: 20px;}

input,textarea{
  width:100%;
  padding:10px;
  margin:8px 0;
  border-radius:8px;
  border:1px solid #ccc;
  box-sizing:border-box;
}

button{
  width:100%;
  padding:12px;
  background:#4E6E58;
  color:white;
  border:none;
  border-radius:8px;
  cursor:pointer;
  transition:0.2s;
  margin-bottom: 10px;
}

button:hover{
  background:#333333;
  transform:translateY(-2px);
}

button:active{
  transform:translateY(0);
}

button:disabled{
  background:#999;
  cursor:not-allowed;
}

.card h2 {
  color: #4E6E58;
}


.list-item {
  padding: 10px;
  border-bottom: 1px solid #eee;
}

.btnHapusPengeluaran {
  background: #ff4d4d;
  color: white;
  border: none;
  padding: 6px 12px;
  border-radius: 8px;
  cursor: pointer;
  transition: 0.2s;
  width: auto;
  margin-top: 8px;
}

img{width:50%;margin-top:10px;border-radius:8px;justify-content:center;display:block;margin-left:auto;margin-right:auto}

.loader {
  border: 3px solid #eee;
  border-top: 3px solid #2d89ef;
  border-radius: 50%;
  width: 20px;
  height: 20px;
  animation: spin 1s linear infinite;
}

.btnPrint {
  background-color: #666666;
}

.btnPrintKhusus {
  background-color: #666666;
}

@keyframes spin {
  0% { transform: rotate(0deg);}
  100% { transform: rotate(360deg);}
}

@media (min-width: 600px) {
  button {
    width: 100%;
    margin: 10px auto;
    display: block;
  }

  .card {
    max-width: 400px;
    margin: 20px auto;
  }

  .btnCopy {
    width: auto;
    margin: 10px;
  }

  .btnHapusPengeluaran {
    width: auto;
    margin: 0px;
  }
  

  
}
</style>
</head>

<body>

<div class="card">

<h2>Data Pengeluaran</h2>

    <div class="listProduk">
        <input id="namaPengeluaran" placeholder="Nama pengeluaran" required>
        <input id="nominal" type="text" placeholder="Nominal pengeluaran" required>
        <input id="catatan" type="" placeholder="Catatan" required>
        <input id="tanggal" type="date" placeholder="Tanggal" required>
    </div>
    <p id="status"></p>
    <div id="loading" class="loader" style="display:none;"></div>
    <button id="btnSimpan" type="submit">Simpan</button>
    </div>

  <div class="card">
    <p style="margin:0; padding:0; color:#777; font-size:12px;">Pengeluaran terakhir:</p>
    <div id="listTerakhir">
    <p>Memuat...</p>
    </div>
  </div>  
  


</div>

<div class="card">
  <button id="btnDataPengeluaran" class="btnDataPengeluaran">DATA PENGELUARAN</button>
  <button id="btnKembali">Kembali</button>
</div>

<footer id="footer" style="text-align:center; margin-top:40px; color:#777; font-size:14px;">
  © 2026 Banksampahdigital by mbayusubagja
</footer>

<script src="config.js"></script>

<script>
const btnSimpan = document.getElementById("btnSimpan");
const btnKembali = document.getElementById("btnKembali");
const status = document.getElementById("status");
const btnDataPengeluaran = document.getElementById("btnDataPengeluaran");

btnKembali.addEventListener("click", () => {
  window.location.href = "keuangan.html";
});

btnDataPengeluaran.addEventListener("click", () => {
  window.location.href = "detail-pengeluaran.html";
});

// simpan pengeluaran

btnSimpan.addEventListener("click", async function () {

  const namaPengeluaran = document.getElementById("namaPengeluaran").value.toUpperCase();
  const nominalPengeluaran = document.getElementById("nominal").value.replace(/\D/g, "");
  const catatan = document.getElementById("catatan").value.toUpperCase();
  const tanggal = document.getElementById("tanggal").value;
  const listTerakhir = document.getElementById("listTerakhir");

  const error = validasi();
  if(error){
    showToast(error);
    return;
  }

  btnSimpan.disabled = true;
  btnSimpan.innerText = "Menyimpan...";
  status.innerText = "Proses...";

  const data = {
  mode: "simpanPengeluaran",
  namaPengeluaran: namaPengeluaran,
  nominalPengeluaran: nominalPengeluaran,
  catatan: catatan,
  tanggal: tanggal
};

  try {

    const res = await fetch(CONFIG.API_URL, {
      method: "POST",
      body: JSON.stringify(data)
    });

    const r = await res.json();

    btnSimpan.disabled = false;
    btnSimpan.innerText = "Simpan";

    if (!r.ok) {
      status.innerText = r.message || "❌ Gagal menyimpan";
      return;
    }

    status.innerHTML =
      "✅ " + "Pengeluaran " + "<b>" + namaPengeluaran + "</b>" + " berhasil tersimpan.";
    resetForm();
    getPengeluaranTerakhir();


  } catch (err) {
    console.log(err);
    btnSimpan.disabled = false;
    btnSimpan.innerText = "Simpan";
    status.innerText = "❌ Gagal menyimpan";
  }

});

// ================= VALIDASI =================
function validasi() {
  if (!document.getElementById("namaPengeluaran").value) return "Nama pengeluaran wajib diisi";
  if (!document.getElementById("nominal").value) return "Nominal pengeluaran wajib diisi";
  return null;
}

// ================= TOAST =================
function showToast(msg) {
  const div = document.createElement("div");
  div.innerText = msg;

  div.style.position = "fixed";
  div.style.bottom = "20px";
  div.style.left = "50%";
  div.style.transform = "translateX(-50%)";
  div.style.background = "#333";
  div.style.color = "#fff";
  div.style.padding = "10px 20px";
  div.style.borderRadius = "8px";
  div.style.zIndex = "9999";

  document.body.appendChild(div);

  setTimeout(() => {
    div.remove();
  }, 2000);
}

// ================= RESET FORM =================
function resetForm(){

  document.getElementById("namaPengeluaran").value = "";
  document.getElementById("nominal").value = "";
  document.getElementById("catatan").value = "";

}

// ================= LIST TERAKHIR =================
async function getPengeluaranTerakhir(){

  try {

    const res = await fetch(
      CONFIG.API_URL + "?action=getPengeluaranTerakhir"
    );

    const r = await res.json();

    console.log(r);

    if(!r.ok){
      listTerakhir.innerText = "Gagal memuat";
      return;
    }

    listTerakhir.innerHTML = r.data.map(n => `
      <div class="list-item">
        <b>${n.namaPengeluaran}</b><br>
        Nominal Pengeluaran: Rp ${new Intl.NumberFormat("id-ID")
                .format(n.nominalPengeluaran)}<br>
        Catatan: ${n.catatan}<br>
        <button class="btnHapusPengeluaran" id="btnHapusPengeluaran" onclick="hapusPengeluaran(event, '${n.id}')">Hapus</button>
      </div>
    `).join("");

  } catch(err){

    console.log(err);

  }

}

// ================= HAPUS NASABAH =================
async function hapusPengeluaran(e, id){

  e.stopPropagation();
  
  if(!confirm("Hapus pengeluaran ini?")) return;

  console.log("Hapus pengeluaran dengan id:", id);

  try{

    const body = new URLSearchParams({
      mode: "hapusPengeluaran",
      id: id
    });

    const res = await fetch(CONFIG.API_URL,{
      method:"POST",
      body: body
    });

    const r = await res.json();

    if(!r.ok){
      alert(r.message);
      return;
    }

    alert("Pengeluaran berhasil dihapus");

    getPengeluaranTerakhir();

  }catch(err){

    console.log(err);
    alert("Gagal menghapus pengeluaran");

  }

}

// ================== format rupiah ==================
function formatInputRupiah(id){

  const input = document.getElementById(id);

  input.addEventListener("input", function () {

    let angka = this.value.replace(/\D/g, "");

    if(!angka){
      this.value = "";
      return;
    }

    this.value = "Rp " + new Intl.NumberFormat("id-ID").format(angka);

  });

}

formatInputRupiah("nominal");

window.addEventListener("DOMContentLoaded", () => {
// tanggal hari ini
  const tanggal = document.getElementById("tanggal");

  const today = new Date();
  const yyyy = today.getFullYear();
  const mm = String(today.getMonth() + 1).padStart(2, "0");
  const dd = String(today.getDate()).padStart(2, "0");

  tanggal.value = `${yyyy}-${mm}-${dd}`;


  getPengeluaranTerakhir();

  setInterval(getPengeluaranTerakhir, 20000);
});



</script>
<script src="printpenimbangan.js"></script> 

</body>
</html>
